{# Waffle: workspace roles only + sign out. #}
<div class="app-launcher" data-app-launcher>
  <button
    type="button"
    class="app-launcher-trigger"
    aria-expanded="false"
    aria-controls="app-launcher-panel"
    aria-haspopup="true"
    aria-label="Menu"
  >
    <span class="app-launcher-dots" aria-hidden="true">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </span>
  </button>
  <div id="app-launcher-panel" class="app-launcher-panel" role="menu" hidden>
    {% if show_roles_in_waffle %}
    <p class="app-launcher-heading">Roles</p>
    {% for a in workspace_assignments %}
    <a
      class="app-launcher-item"
      role="menuitem"
      href="{{ url_for('main.workspace_select', body=a.body, role_code=a.role_code) }}"
    >{{ a.label }}</a>
    {% endfor %}
    {% endif %}
    {% if current_user.is_authenticated %}
    <p class="app-launcher-heading app-launcher-heading-sub app-launcher-heading-account">Account</p>
    <a class="app-launcher-item app-launcher-item-signout" role="menuitem" href="{{ url_for('auth.logout') }}">Sign out</a>
    {% endif %}
  </div>
</div>
