{% extends "base.html" %}

{% block title %}Sign In | Lodge Treasurer{% endblock %}

{% block content %}
  <section class="hero-card">
    <div>
      <p class="eyebrow">Private Access</p>
      <h2>Sign in to manage the lodge admin pages.</h2>
    </div>
    <div class="hero-note">
      <p>Use one of the four internal accounts to access the treasurer and secretary tools.</p>
    </div>
  </section>

  <section class="panel">
    <form method="post" class="login-form">
      <label>
        <span>Username</span>
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <div class="settings-actions">
        <button class="button button-primary" type="submit">Sign In</button>
      </div>
    </form>
  </section>
{% endblock %}
