{% extends "base.html" %}

{% block title %}Choose new password | Treasurer Portal{% endblock %}

{% block content %}
  <section class="panel auth-panel">
    <div class="panel-heading">
      <div>
        <h3>Choose a new password</h3>
        <p class="section-note">At least 10 characters. After saving, sign in with your email and this password.</p>
      </div>
    </div>
    <form method="post" class="settings-form auth-form" action="{{ url_for('auth.reset_password') }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="settings-single-field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="10" autofocus>
      </div>
      <div class="settings-single-field">
        <label for="password_confirm">Confirm password</label>
        <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" required minlength="10">
      </div>
      <div class="settings-actions">
        <button type="submit" class="button button-primary">Save password</button>
        <a class="button" href="{{ url_for('auth.login') }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
